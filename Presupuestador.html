<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tec.Nito - Generador de Presupuestos</title>

    <!-- Fuentes de Google: Nunito -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Nunito', 'sans-serif'] }
                }
            }
        }
    </script>

    <!-- Íconos de Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- CSS Personalizado -->
    <style>
        :root {
            --bg-light: #FFF5F7;
            --dot-light: #FDE2E4;
            --accent-light: #d6336c;
            --margin-light: #ff9a9e;
            --box-light: #ffffff;
            --bg-accent-light: #FFF5F7;

            --bg-dark: #1a1a24;
            --dot-dark: #2a2a3a;
            --accent-dark: #bfaee3;
            --margin-dark: #bfaee3;
            --box-dark: #232332;
            --bg-accent-dark: #1e1e2c;
        }

        body {
            background-color: var(--bg-light);
            background-image: radial-gradient(var(--dot-light) 1px, transparent 1px);
            background-size: 20px 20px;
            transition: background-color 0.3s ease, color 0.3s ease;
            color: #333344;
            padding: 2rem 1rem;
        }

        html.dark body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(var(--dot-dark) 1px, transparent 1px);
            color: #e2e8f0;
        }

        /* Ocultar flechas de inputs numéricos */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"] {
            -moz-appearance: textfield;
        }

        /* Cuaderno Principal: Ancho ajustado para simular mejor el A4 */
        .notebook-page {
            background-color: var(--box-light);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05), inset 0 0 20px rgba(0, 0, 0, 0.01);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            max-width: 800px;
            /* Tamaño ideal para impresión A4 */
            margin: 0 auto;
            border-radius: 8px;
            overflow: hidden;
        }

        html.dark .notebook-page {
            background-color: var(--box-dark);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4), inset 0 0 20px rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Margen vertical */
        .notebook-page::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 40px;
            width: 2px;
            background-color: var(--margin-light);
            z-index: 0;
            opacity: 0.5;
        }

        html.dark .notebook-page::before {
            background-color: var(--margin-dark);
            opacity: 0.3;
        }

        .notebook-content {
            position: relative;
            z-index: 1;
            padding: 2.5rem 2.5rem 2.5rem 4rem;
            /* Ajustado para que nada se corte */
        }

        /* Inputs ultra limpios */
        .cuack-input {
            width: 100%;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 4px;
            padding: 2px 4px;
            margin-left: -4px;
            transition: all 0.2s;
            resize: none;
            color: inherit;
            font-family: inherit;
        }

        .cuack-input:hover,
        .cuack-input:focus {
            background-color: rgba(0, 0, 0, 0.03);
            border-color: rgba(0, 0, 0, 0.1);
            outline: none;
        }

        html.dark .cuack-input:hover,
        html.dark .cuack-input:focus {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        textarea.cuack-input {
            overflow: hidden;
            min-height: 28px;
            line-height: 1.5;
        }

        .accent-text {
            color: var(--accent-light);
        }

        html.dark .accent-text {
            color: var(--accent-dark);
        }

        .accent-bg {
            background-color: var(--bg-accent-light);
        }

        html.dark .accent-bg {
            background-color: var(--bg-accent-dark);
        }

        .border-line {
            border-color: rgba(0, 0, 0, 0.1);
        }

        html.dark .border-line {
            border-color: rgba(255, 255, 255, 0.1);
        }

        .btn-primary {
            background-color: var(--accent-light);
            color: white;
        }

        html.dark .btn-primary {
            background-color: var(--accent-dark);
            color: #1a1a24;
        }

        /* Estructura de Tabla: 6 columnas en pantalla */
        .grid-table {
            display: grid;
            grid-template-columns: 24px 1fr 60px 110px 130px 30px;
            gap: 8px;
            align-items: start;
        }

        /* CONFIGURACIÓN EXACTA PARA PDF (Impresión) */
        @media print {
            @page {
                margin: 0.5cm;
            }

            body {
                background-color: white !important;
                background-image: none !important;
                padding: 0;
            }

            html.dark body {
                background-color: var(--bg-dark) !important;
            }

            .notebook-page {
                box-shadow: none !important;
                border: none !important;
                max-width: 100% !important;
            }

            .notebook-content {
                padding: 2rem 1rem 2rem 3.5rem !important;
            }

            .print-hide {
                display: none !important;
            }

            /* Reestructuración de grilla a 4 columnas para que nada se corra */
            .grid-table {
                grid-template-columns: 1fr 50px 110px 130px !important;
                align-items: start !important;
            }

            .cuack-input {
                border: none !important;
                background: transparent !important;
                padding: 0 !important;
                margin: 0 !important;
            }

            .accent-bg,
            .notebook-page,
            html.dark body {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            /* Evitar que las filas se corten a la mitad entre páginas */
            .fila-calculo {
                page-break-inside: avoid;
            }
        }
    </style>
</head>

<body>

    <!-- Barra Superior -->
    <div class="max-w-[800px] mx-auto mb-6 flex justify-between items-center print-hide px-2">
        <h1 class="text-xl md:text-2xl font-black flex items-center gap-2 accent-text tracking-tight">
            <i data-lucide="file-text" class="w-7 h-7"></i>
            Tec.Nito Docs
        </h1>
        <div class="flex gap-2 sm:gap-3">
            <button onclick="abrirHistorial()" class="p-2.5 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors shadow-sm bg-white dark:bg-gray-800" title="Historial de Presupuestos">
                <i data-lucide="folder-open" class="w-5 h-5 text-blue-500"></i>
            </button>
            <button onclick="guardarEnHistorial()" class="p-2.5 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors shadow-sm bg-white dark:bg-gray-800" title="Guardar Copia en Historial">
                <i data-lucide="save" class="w-5 h-5 text-green-500"></i>
            </button>
            <button onclick="borrarDatos()"
                class="p-2.5 rounded-full hover:bg-red-100 dark:hover:bg-red-900/30 text-red-500 transition-colors shadow-sm bg-white dark:bg-gray-800"
                title="Borrar Datos y Reiniciar">
                <i data-lucide="trash-2" class="w-5 h-5"></i>
            </button>

            <!-- Selector de Color de Acento -->
            <div class="relative flex items-center justify-center">
                <input type="color" id="color-picker" oninput="cambiarColorAcento(this.value)"
                    class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" title="Cambiar Color de Acento">
                <div class="p-2.5 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors shadow-sm bg-white dark:bg-gray-800 flex items-center justify-center">
                    <i data-lucide="palette" class="w-5 h-5 text-gray-600 dark:text-gray-300"></i>
                </div>
            </div>

            <button onclick="toggleDarkMode()"
                class="p-2.5 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors shadow-sm bg-white dark:bg-gray-800"
                title="Alternar Modo Claro/Oscuro">
                <i data-lucide="moon" id="moon-icon" class="w-5 h-5 text-indigo-600"></i>
                <i data-lucide="sun" id="sun-icon" class="w-5 h-5 text-yellow-400 hidden"></i>
            </button>
            <button onclick="imprimirPDF()"
                class="btn-primary hover:scale-105 active:scale-95 px-5 py-2 rounded-xl shadow-md flex items-center gap-2 transition-all font-bold">
                <i data-lucide="printer" class="w-5 h-5"></i>
                <span class="hidden sm:inline">Exportar PDF</span>
            </button>
        </div>
    </div>

    <!-- DOCUMENTO -->
    <div class="notebook-page">
        <div class="notebook-content">

            <!-- 1. Cabecera -->
            <div class="flex flex-row justify-between items-start border-b-[2px] border-line pb-5 mb-8 gap-4">
                <!-- Empresa -->
                <div class="w-[55%] flex flex-col gap-0.5">
                    <input type="text" id="empresa-nombre" class="cuack-input font-bold text-xl sm:text-2xl accent-text tracking-tight"
                        value="Tec.Nito">
                    <input type="text" id="empresa-tel" class="cuack-input font-semibold opacity-60 text-xs sm:text-sm"
                        value="+54 9 260 461 7198">
                    <input type="text" id="empresa-email" class="cuack-input font-semibold opacity-60 text-xs sm:text-sm"
                        value="nico.sgandurra@gmail.com">
                </div>

                <!-- Metadatos Documento -->
                <div class="w-[45%] flex flex-col items-end text-right">
                    <h2 class="text-xl sm:text-2xl font-black opacity-10 uppercase tracking-widest mb-3">Presupuesto
                    </h2>
                    <div class="grid grid-cols-[auto_auto] gap-x-2 gap-y-1 items-center">
                        <span class="font-bold opacity-60 text-xs sm:text-sm uppercase tracking-wider text-right">Nº:</span>
                        <input type="text" id="presupuesto-nro" class="cuack-input font-bold w-36 sm:w-48 text-right" value="PRE-0001">
                        
                        <span class="font-bold opacity-60 text-xs sm:text-sm uppercase tracking-wider text-right">Fecha:</span>
                        <input type="text" id="fecha-doc" class="cuack-input font-bold w-36 sm:w-48 text-right">
                        
                        <div id="lbl-validez" class="flex items-center justify-end gap-1 font-bold opacity-60 text-xs sm:text-sm uppercase tracking-wider text-right group">
                            <button onclick="toggleVisibilidad('validez')" id="btn-toggle-validez" class="print-hide opacity-0 group-hover:opacity-100 transition-opacity p-1 rounded hover:bg-black/5 dark:hover:bg-white/5" title="Ocultar/Mostrar Validez">
                                <i data-lucide="eye" class="w-3 h-3"></i>
                            </button>
                            Validez:
                        </div>
                        <div id="contenedor-validez">
                            <input type="text" id="validez" class="cuack-input font-bold w-36 sm:w-48 text-right" value="15 días">
                        </div>
                    </div>
                </div>
            </div>

            <!-- 2. Cliente -->
            <div class="accent-bg p-5 rounded-xl mb-10 shadow-sm border border-line">
                <h3 class="text-[10px] font-black opacity-50 uppercase tracking-widest mb-3">Preparado para:</h3>
                <div class="grid grid-cols-1 gap-1">
                    <input type="text" id="cliente-nombre" class="cuack-input font-bold text-xl" placeholder="Nombre del Cliente o Empresa">
                    <input type="text" id="cliente-dir" class="cuack-input opacity-70 font-medium" placeholder="Dirección del Cliente">
                    <input type="text" id="cliente-tel" class="cuack-input opacity-70 font-medium"
                        placeholder="Teléfono / Email del Cliente">
                </div>
            </div>

            <!-- 3. MATERIALES -->
            <div class="mb-10">
                <h4 class="font-black text-lg mb-3 flex items-center gap-2 opacity-80">
                    <i data-lucide="package" class="w-5 h-5 accent-text"></i> 
                    <input type="text" id="titulo-materiales" class="cuack-input bg-transparent font-black text-lg p-0 m-0 w-auto flex-1 outline-none border-none focus:ring-0" value="Materiales y Repuestos">
                </h4>

                <!-- Cabecera -->
                <div
                    class="grid-table border-b-[2px] border-line pb-2 mb-3 text-[11px] font-black uppercase tracking-widest opacity-50 px-1">
                    <div class="print-hide"></div>
                    <div>Descripción</div>
                    <div class="text-center">Cant.</div>
                    <div class="text-right">Precio Un.</div>
                    <div class="text-right">Total</div>
                    <div class="print-hide"></div>
                </div>

                <div id="lista-materiales" class="flex flex-col gap-1"></div>

                <button onclick="agregarFila('materiales')"
                    class="mt-3 flex items-center gap-1.5 font-bold text-xs uppercase tracking-wider transition-colors print-hide accent-text opacity-70 hover:opacity-100">
                    <i data-lucide="plus" class="w-4 h-4 stroke-[3]"></i> Agregar Material
                </button>
            </div>

            <!-- 4. SERVICIOS -->
            <div id="seccion-servicios" class="mb-10 group">
                <h4 class="font-black text-lg mb-3 flex items-center gap-2 opacity-80">
                    <i data-lucide="pen-tool" class="w-5 h-5 accent-text"></i> 
                    <input type="text" id="titulo-servicios" class="cuack-input bg-transparent font-black text-lg p-0 m-0 w-auto flex-1 outline-none border-none focus:ring-0" value="Mano de Obra y Servicios">
                    <button onclick="toggleVisibilidad('servicios')" id="btn-toggle-servicios" class="print-hide opacity-0 group-hover:opacity-100 transition-opacity p-1.5 rounded-lg hover:bg-black/5 dark:hover:bg-white/5 text-gray-500" title="Ocultar/Mostrar Sección">
                        <i data-lucide="eye" class="w-4 h-4"></i>
                    </button>
                </h4>

                <div id="contenido-servicios">
                    <!-- Cabecera -->
                    <div
                        class="grid-table border-b-[2px] border-line pb-2 mb-3 text-[11px] font-black uppercase tracking-widest opacity-50 px-1">
                        <div>Descripción del Trabajo</div>
                        <div class="text-center">Cant.</div>
                        <div class="text-right">Precio Un.</div>
                        <div class="text-right">Total</div>
                        <div class="print-hide"></div>
                    </div>

                    <div id="lista-servicios" class="flex flex-col gap-1"></div>

                    <button onclick="agregarFila('servicios')"
                        class="mt-3 flex items-center gap-1.5 font-bold text-xs uppercase tracking-wider transition-colors print-hide accent-text opacity-70 hover:opacity-100">
                        <i data-lucide="plus" class="w-4 h-4 stroke-[3]"></i> Agregar Servicio
                    </button>
                </div>
            </div>

            <!-- 5. Resumen -->
            <div class="flex flex-row justify-between items-start gap-6 mt-12 flex-wrap sm:flex-nowrap w-full">
                <!-- Notas -->
                <div id="seccion-terminos" class="w-full sm:w-[40%] order-2 sm:order-1 mt-6 sm:mt-0 group">
                    <h4 class="text-[10px] font-black opacity-40 uppercase tracking-widest mb-2 flex items-center gap-2">
                        Términos y Condiciones:
                        <button onclick="toggleVisibilidad('terminos')" id="btn-toggle-terminos" class="print-hide opacity-0 group-hover:opacity-100 transition-opacity p-1 rounded hover:bg-black/5 dark:hover:bg-white/5" title="Ocultar/Mostrar Términos">
                            <i data-lucide="eye" class="w-3 h-3"></i>
                        </button>
                    </h4>
                    <div id="contenido-terminos">
                        <textarea id="terminos"
                            class="cuack-input font-medium opacity-70 p-3 rounded-xl border border-transparent hover:border-line bg-transparent hover:bg-black hover:bg-opacity-5 dark:hover:bg-white dark:hover:bg-opacity-5 auto-resize text-sm sm:text-base"
                            rows="4">El trabajo tiene una garantía de 90 días sobre la mano de obra. Los repuestos cuentan con la garantía oficial del fabricante. Se requiere un adelanto del 50% para iniciar.</textarea>
                    </div>
                </div>

                <!-- Totales -->
                <div id="contenedor-totales"
                    class="w-full sm:w-[55%] sm:max-w-[420px] order-1 sm:order-2 accent-bg rounded-2xl p-5 shadow-sm border border-line ml-auto">
                    <div class="flex justify-between items-center mb-2 font-semibold opacity-70 text-sm">
                        <span id="label-total-materiales">Total Materiales:</span>
                        <span id="total-materiales">AR$ 0</span>
                    </div>
                    <div id="resumen-servicios"
                        class="flex justify-between items-center mb-4 pb-4 border-b-2 border-line font-semibold opacity-70 text-sm">
                        <span id="label-total-servicios">Total Servicios:</span>
                        <span id="total-servicios">AR$ 0</span>
                    </div>
                    <div class="flex justify-between items-end">
                        <span class="text-xl font-black opacity-90 tracking-tight">TOTAL</span>
                        <span id="gran-total" class="text-3xl font-black accent-text drop-shadow-sm">AR$ 0</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Modal Historial -->
    <div id="modal-historial" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center backdrop-blur-sm print-hide">
        <div class="bg-white dark:bg-gray-800 rounded-2xl w-[90%] max-w-2xl max-h-[80vh] flex flex-col shadow-2xl overflow-hidden transform transition-all">
            <div class="p-5 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center bg-gray-50 dark:bg-gray-900/50">
                <h2 class="text-xl font-bold flex items-center gap-2"><i data-lucide="folder-open" class="text-blue-500"></i> Historial de Presupuestos</h2>
                <button onclick="cerrarHistorial()" class="p-2 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-full transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-5 flex-1 overflow-y-auto">
                <div id="lista-historial" class="flex flex-col gap-3">
                    <!-- Items dinámicos -->
                </div>
            </div>
        </div>
    </div>

    <!-- LÓGICA JAVASCRIPT -->
    <script>
        lucide.createIcons();
        
        // --- SISTEMA DE HISTORIAL ---
        const HISTORIAL_KEY = 'presupuestador_historial';

        function obtenerHistorial() {
            const historialGuardado = localStorage.getItem(HISTORIAL_KEY);
            return historialGuardado ? JSON.parse(historialGuardado) : [];
        }

        function guardarEnHistorial() {
            const cliente = document.getElementById('cliente-nombre').value || 'Sin Cliente';
            const nro = document.getElementById('presupuesto-nro').value || 'S/N';
            const total = document.getElementById('gran-total').innerText;
            
            let nombre = prompt("Nombre para guardar este presupuesto:", `${nro} - ${cliente}`);
            if (!nombre) return;

            // Para no duplicar código, forzamos guardarDatos() actualizando el localStorage
            guardarDatos();
            const datosActuales = JSON.parse(localStorage.getItem('presupuestador_datos'));

            const historial = obtenerHistorial();
            const nuevoRegistro = {
                id: Date.now().toString(),
                nombre: nombre,
                fechaGuardado: new Date().toLocaleDateString('es-ES') + ' ' + new Date().toLocaleTimeString('es-ES', {hour: '2-digit', minute:'2-digit'}),
                total: total,
                datos: datosActuales
            };

            historial.unshift(nuevoRegistro);
            localStorage.setItem(HISTORIAL_KEY, JSON.stringify(historial));
            alert('¡Presupuesto guardado en el historial!');
        }

        function abrirHistorial() {
            const modal = document.getElementById('modal-historial');
            const lista = document.getElementById('lista-historial');
            modal.classList.remove('hidden');
            
            const historial = obtenerHistorial();
            
            if (historial.length === 0) {
                lista.innerHTML = '<div class="text-center py-10 opacity-50">No hay presupuestos guardados aún.</div>';
                return;
            }

            lista.innerHTML = historial.map(h => `
                <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between p-4 bg-gray-50 dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 hover:border-gray-300 dark:hover:border-gray-600 transition-colors gap-4">
                    <div class="flex flex-col">
                        <span class="font-bold text-lg">${h.nombre}</span>
                        <span class="text-xs opacity-60 flex items-center gap-1 mt-1">
                            <i data-lucide="clock" class="w-3 h-3"></i> ${h.fechaGuardado} &nbsp;|&nbsp; <strong>${h.total}</strong>
                        </span>
                    </div>
                    <div class="flex items-center gap-2 w-full sm:w-auto">
                        <button onclick="cargarDelHistorial('${h.id}')" class="flex-1 sm:flex-none px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg text-sm font-bold transition-colors shadow-sm">Cargar</button>
                        <button onclick="eliminarDelHistorial('${h.id}')" class="p-2 text-red-500 hover:bg-red-100 dark:hover:bg-red-900/30 rounded-lg transition-colors" title="Eliminar"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                    </div>
                </div>
            `).join('');
            
            lucide.createIcons();
        }

        function cerrarHistorial() {
            document.getElementById('modal-historial').classList.add('hidden');
        }

        function cargarDelHistorial(id) {
            if(!confirm('¿Cargar este presupuesto? Los datos en pantalla que no hayas guardado se perderán.')) return;
            
            const historial = obtenerHistorial();
            const registro = historial.find(h => h.id === id);
            if (registro) {
                localStorage.setItem('presupuestador_datos', JSON.stringify(registro.datos));
                cargarDatos();
                cerrarHistorial();
            }
        }

        function eliminarDelHistorial(id) {
            if(!confirm('¿Estás seguro de eliminar este presupuesto del historial?')) return;
            let historial = obtenerHistorial();
            historial = historial.filter(h => h.id !== id);
            localStorage.setItem(HISTORIAL_KEY, JSON.stringify(historial));
            abrirHistorial(); // Refrescar lista
        }
        
        // --- SISTEMA DE DATOS Y LOCAL STORAGE ---
        let visibilidad = {
            validez: true,
            servicios: true,
            terminos: true
        };

        function toggleVisibilidad(seccion) {
            visibilidad[seccion] = !visibilidad[seccion];
            aplicarVisibilidad();
            guardarDatos();
        }

        function aplicarVisibilidad() {
            // Validez
            const lblValidez = document.getElementById('lbl-validez');
            const cntValidez = document.getElementById('contenedor-validez');
            const btnValidez = document.getElementById('btn-toggle-validez');
            if (visibilidad.validez) {
                cntValidez.classList.remove('hidden');
                btnValidez.innerHTML = '<i data-lucide="eye" class="w-3 h-3"></i>';
                lblValidez.classList.remove('print-hide');
            } else {
                cntValidez.classList.add('hidden');
                btnValidez.innerHTML = '<i data-lucide="eye-off" class="w-3 h-3"></i>';
                lblValidez.classList.add('print-hide');
            }

            // Servicios
            const secServicios = document.getElementById('seccion-servicios');
            const cntServicios = document.getElementById('contenido-servicios');
            const btnServicios = document.getElementById('btn-toggle-servicios');
            const resumenServicios = document.getElementById('resumen-servicios');
            if (visibilidad.servicios) {
                cntServicios.classList.remove('hidden');
                secServicios.classList.remove('print-hide');
                resumenServicios.classList.remove('hidden');
                resumenServicios.classList.add('flex');
                btnServicios.innerHTML = '<i data-lucide="eye" class="w-4 h-4"></i>';
            } else {
                cntServicios.classList.add('hidden');
                secServicios.classList.add('print-hide');
                resumenServicios.classList.add('hidden');
                resumenServicios.classList.remove('flex');
                btnServicios.innerHTML = '<i data-lucide="eye-off" class="w-4 h-4"></i>';
            }

            // Terminos
            const secTerminos = document.getElementById('seccion-terminos');
            const cntTerminos = document.getElementById('contenido-terminos');
            const btnTerminos = document.getElementById('btn-toggle-terminos');
            if (visibilidad.terminos) {
                cntTerminos.classList.remove('hidden');
                secTerminos.classList.remove('print-hide');
                btnTerminos.innerHTML = '<i data-lucide="eye" class="w-3 h-3"></i>';
            } else {
                cntTerminos.classList.add('hidden');
                secTerminos.classList.add('print-hide');
                btnTerminos.innerHTML = '<i data-lucide="eye-off" class="w-3 h-3"></i>';
            }

            lucide.createIcons();
            calcularTodo(); // Para actualizar los totales si se ocultaron servicios
        }

        function cambiarColorAcento(color) {
            document.documentElement.style.setProperty('--accent-light', color);
            document.documentElement.style.setProperty('--accent-dark', color);
            document.documentElement.style.setProperty('--margin-light', color);
            document.documentElement.style.setProperty('--margin-dark', color);
            guardarDatos();
        }

        function obtenerFechaEspanol() {
            const opcionesFecha = { year: 'numeric', month: 'long', day: 'numeric' };
            return new Date().toLocaleDateString('es-ES', opcionesFecha);
        }

        function guardarDatos() {
            const datos = {
                empresa: document.getElementById('empresa-nombre').value,
                empresaTel: document.getElementById('empresa-tel').value,
                empresaEmail: document.getElementById('empresa-email').value,
                nro: document.getElementById('presupuesto-nro').value,
                fecha: document.getElementById('fecha-doc').value,
                validez: document.getElementById('validez').value,
                clienteNombre: document.getElementById('cliente-nombre').value,
                clienteDir: document.getElementById('cliente-dir').value,
                clienteTel: document.getElementById('cliente-tel').value,
                materiales: Array.from(document.querySelectorAll('#lista-materiales .fila-calculo')).map(f => ({
                    desc: f.querySelector('textarea').value,
                    cant: f.querySelector('.input-cant').value,
                    precio: f.querySelector('.input-precio').value
                })),
                servicios: Array.from(document.querySelectorAll('#lista-servicios .fila-calculo')).map(f => ({
                    desc: f.querySelector('textarea').value,
                    cant: f.querySelector('.input-cant').value,
                    precio: f.querySelector('.input-precio').value
                })),
                terminos: document.getElementById('terminos').value,
                color: document.getElementById('color-picker').value || '#d6336c',
                tituloMateriales: document.getElementById('titulo-materiales').value,
                tituloServicios: document.getElementById('titulo-servicios').value,
                visibilidad: visibilidad
            };
            localStorage.setItem('presupuestador_datos', JSON.stringify(datos));
        }

        function cargarDatos() {
            const datosGuardados = localStorage.getItem('presupuestador_datos');
            if (datosGuardados) {
                const datos = JSON.parse(datosGuardados);
                
                document.getElementById('empresa-nombre').value = datos.empresa || 'Tec.Nito - Servicios Integrales';
                document.getElementById('empresa-tel').value = datos.empresaTel || '+54 9 260 461 7198';
                document.getElementById('empresa-email').value = datos.empresaEmail || 'nico.sgandurra@gmail.com';
                document.getElementById('presupuesto-nro').value = datos.nro || 'PRE-0001';
                document.getElementById('fecha-doc').value = datos.fecha || obtenerFechaEspanol();
                document.getElementById('validez').value = datos.validez || '15 días';
                document.getElementById('cliente-nombre').value = datos.clienteNombre || '';
                document.getElementById('cliente-dir').value = datos.clienteDir || '';
                document.getElementById('cliente-tel').value = datos.clienteTel || '';
                document.getElementById('terminos').value = datos.terminos || 'El trabajo tiene una garantía de 90 días sobre la mano de obra. Los repuestos cuentan con la garantía oficial del fabricante. Se requiere un adelanto del 50% para iniciar.';
                document.getElementById('titulo-materiales').value = datos.tituloMateriales || 'Materiales y Repuestos';
                document.getElementById('titulo-servicios').value = datos.tituloServicios || 'Mano de Obra y Servicios';
                
                if (datos.visibilidad) {
                    visibilidad = { ...visibilidad, ...datos.visibilidad };
                }
                
                if (datos.color && datos.color !== '#d6336c') {
                    document.getElementById('color-picker').value = datos.color;
                    cambiarColorAcento(datos.color);
                } else {
                    document.getElementById('color-picker').value = '#d6336c';
                }

                document.getElementById('lista-materiales').innerHTML = '';
                if (datos.materiales && datos.materiales.length > 0) {
                    datos.materiales.forEach(m => {
                        document.getElementById('lista-materiales').insertAdjacentHTML('beforeend', crearHTMLFila('materiales', m.desc, m.cant, m.precio));
                    });
                }

                document.getElementById('lista-servicios').innerHTML = '';
                if (datos.servicios && datos.servicios.length > 0) {
                    datos.servicios.forEach(s => {
                        document.getElementById('lista-servicios').insertAdjacentHTML('beforeend', crearHTMLFila('servicios', s.desc, s.cant, s.precio));
                    });
                }
                
                aplicarVisibilidad();
                setTimeout(makeDraggable, 100);
            } else {
                document.getElementById('fecha-doc').value = obtenerFechaEspanol();
                document.getElementById('color-picker').value = '#d6336c';
                
                document.getElementById('lista-materiales').innerHTML =
                    crearHTMLFila('materiales', 'Disco Sólido SSD 500GB', 1, 45000) +
                    crearHTMLFila('materiales', 'Memoria RAM 8GB DDR4', 1, 22000);

                document.getElementById('lista-servicios').innerHTML =
                    crearHTMLFila('servicios', 'Instalación de Sistema Operativo y backup', 1, 25000);
                
                aplicarVisibilidad();
                setTimeout(makeDraggable, 100);
            }
        }

        function borrarDatos() {
            if (confirm('¿Estás seguro de que deseas borrar todos los datos y reiniciar el presupuesto?')) {
                localStorage.removeItem('presupuestador_datos');
                document.documentElement.style.removeProperty('--accent-light');
                document.documentElement.style.removeProperty('--accent-dark');
                document.documentElement.style.removeProperty('--margin-light');
                document.documentElement.style.removeProperty('--margin-dark');
                location.reload();
            }
        }

        // Guardar automáticamente al escribir o cambiar cualquier input
        document.addEventListener('input', guardarDatos);

        // Formateador de moneda (Forzando AR$)
        const formatearMoneda = (valor) => {
            const numeroFormateado = new Intl.NumberFormat('es-AR', { minimumFractionDigits: 0 }).format(valor);
            return 'AR$ ' + numeroFormateado;
        };

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            document.getElementById('moon-icon').classList.toggle('hidden');
            document.getElementById('sun-icon').classList.toggle('hidden');
        }

        // --- SISTEMA DE TABLAS ---
        function crearHTMLFila(tipo, descripcion = '', cantidad = 1, precio = 0) {
            const id = Date.now() + Math.random();
            return `
                <div class="grid-table group py-1 fila-calculo px-1 transition-all duration-200" id="fila-${id}" data-tipo="${tipo}">
                    <div class="flex items-start justify-center print-hide pt-1">
                        <div class="drag-handle cursor-grab active:cursor-grabbing p-1 opacity-20 group-hover:opacity-100 transition-opacity text-gray-500 hover:text-gray-800 dark:hover:text-gray-300" title="Arrastrar para reordenar">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="12" r="1"></circle><circle cx="9" cy="5" r="1"></circle><circle cx="9" cy="19" r="1"></circle><circle cx="15" cy="12" r="1"></circle><circle cx="15" cy="5" r="1"></circle><circle cx="15" cy="19" r="1"></circle></svg>
                        </div>
                    </div>
                    <div>
                        <textarea class="cuack-input font-semibold auto-resize text-sm sm:text-base" placeholder="Descripción del ítem..." oninput="autoResize(this)" rows="1">${descripcion}</textarea>
                    </div>
                    <div>
                        <input type="number" class="cuack-input text-center font-bold input-cant" placeholder="0" value="${cantidad}" oninput="calcularTodo()">
                    </div>
                    <div class="flex items-center justify-end">
                        <span class="opacity-40 mr-1 text-xs sm:text-sm font-bold">AR$</span>
                        <input type="number" class="cuack-input text-right font-bold input-precio w-full" placeholder="0" value="${precio}" oninput="calcularTodo()">
                    </div>
                    <div class="text-right font-black opacity-90 text-sm sm:text-[15px] fila-total">
                        AR$ 0
                    </div>
                    <div class="opacity-0 group-hover:opacity-100 transition-opacity text-center print-hide">
                        <button onclick="eliminarFila('fila-${id}')" class="text-red-400 hover:text-red-600 p-1 rounded transition-colors" title="Eliminar">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                        </button>
                    </div>
                </div>
            `;
        }

        function agregarFila(tipo) {
            document.getElementById(`lista-${tipo}`).insertAdjacentHTML('beforeend', crearHTMLFila(tipo));
            setTimeout(() => {
                calcularTodo();
                guardarDatos();
                makeDraggable();
            }, 50);
        }

        let draggedRow = null;

        function handleDragStart(e) {
            if (!e.target.closest('.fila-calculo')) return;
            draggedRow = e.target.closest('.fila-calculo');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', '');
            setTimeout(() => draggedRow.classList.add('opacity-50'), 0);
        }

        function handleDragOver(e) {
            e.preventDefault();
            const overRow = e.target.closest('.fila-calculo');
            if (!overRow || overRow === draggedRow) return;
            
            const bounding = overRow.getBoundingClientRect();
            const offset = bounding.y + (bounding.height / 2);
            if (e.clientY - offset > 0) {
                overRow.style.borderBottom = "2px solid var(--accent-light)";
                overRow.style.borderTop = "";
            } else {
                overRow.style.borderTop = "2px solid var(--accent-light)";
                overRow.style.borderBottom = "";
            }
        }

        function handleDragLeave(e) {
            const overRow = e.target.closest('.fila-calculo');
            if (overRow) {
                overRow.style.borderTop = "";
                overRow.style.borderBottom = "";
            }
        }

        function handleDrop(e) {
            e.preventDefault();
            const overRow = e.target.closest('.fila-calculo');
            if (overRow) {
                overRow.style.borderTop = "";
                overRow.style.borderBottom = "";
            }
            
            if (!overRow || overRow === draggedRow || overRow.parentNode !== draggedRow.parentNode) return;

            const bounding = overRow.getBoundingClientRect();
            const offset = bounding.y + (bounding.height / 2);
            
            const container = draggedRow.parentNode;
            if (e.clientY - offset > 0) {
                container.insertBefore(draggedRow, overRow.nextSibling);
            } else {
                container.insertBefore(draggedRow, overRow);
            }
            guardarDatos();
        }

        function handleDragEnd(e) {
            if (draggedRow) {
                draggedRow.classList.remove('opacity-50');
            }
            document.querySelectorAll('.fila-calculo').forEach(row => {
                row.style.borderTop = "";
                row.style.borderBottom = "";
            });
            draggedRow = null;
        }

        function makeDraggable() {
            document.querySelectorAll('.drag-handle').forEach(handle => {
                handle.addEventListener('mousedown', () => {
                    handle.closest('.fila-calculo').setAttribute('draggable', 'true');
                });
                handle.addEventListener('mouseup', () => {
                    handle.closest('.fila-calculo').setAttribute('draggable', 'false');
                });
                handle.addEventListener('mouseleave', () => {
                    handle.closest('.fila-calculo').setAttribute('draggable', 'false');
                });
            });

            document.querySelectorAll('.fila-calculo').forEach(row => {
                row.removeEventListener('dragstart', handleDragStart);
                row.removeEventListener('dragover', handleDragOver);
                row.removeEventListener('dragleave', handleDragLeave);
                row.removeEventListener('drop', handleDrop);
                row.removeEventListener('dragend', handleDragEnd);

                row.addEventListener('dragstart', handleDragStart);
                row.addEventListener('dragover', handleDragOver);
                row.addEventListener('dragleave', handleDragLeave);
                row.addEventListener('drop', handleDrop);
                row.addEventListener('dragend', handleDragEnd);
            });
        }

        function eliminarFila(id) {
            document.getElementById(id).remove();
            calcularTodo();
            guardarDatos();
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        // Antes de imprimir, forzamos la expansión de todos los textareas por si acaso
        function imprimirPDF() {
            document.querySelectorAll('.auto-resize').forEach(el => autoResize(el));
            window.print();
        }

        function calcularTodo() {
            let subtotalMateriales = 0;
            let subtotalServicios = 0;

            document.querySelectorAll('.fila-calculo').forEach(fila => {
                const tipo = fila.getAttribute('data-tipo');
                const cant = parseFloat(fila.querySelector('.input-cant').value) || 0;
                const precio = parseFloat(fila.querySelector('.input-precio').value) || 0;
                const totalFila = cant * precio;

                fila.querySelector('.fila-total').innerText = formatearMoneda(totalFila);

                if (tipo === 'materiales') subtotalMateriales += totalFila;
                if (tipo === 'servicios' && visibilidad.servicios) subtotalServicios += totalFila;
            });

            document.getElementById('total-materiales').innerText = formatearMoneda(subtotalMateriales);
            document.getElementById('total-servicios').innerText = formatearMoneda(subtotalServicios);
            document.getElementById('gran-total').innerText = formatearMoneda(subtotalMateriales + subtotalServicios);
            
            const lblMateriales = document.getElementById('label-total-materiales');
            if (lblMateriales) {
                lblMateriales.innerText = visibilidad.servicios ? 'Total Materiales:' : 'Subtotal:';
            }
        }

        // Carga inicial
        cargarDatos();

        setTimeout(() => {
            calcularTodo();
            document.querySelectorAll('.auto-resize').forEach(el => {
                autoResize(el);
            });
        }, 100);

    </script>
</body>

</html>
